description: Fox Factory Holding Corp sells performance components via e-commerce and dealer
  channels. No SaaS or API billing surface; FinOps treatment is product-procurement-style for
  consuming organizations.
notes: No public API or pricing surface; FinOps shape inferred from a consumer-products procurement
  model.
sources:
  - https://www.ridefox.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Fox Factory Holding Corp.
serviceCategory: Manufacturing & Components
billingModel:
  pricingCategory: Product Purchase
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Refund
focusColumns:
  ServiceName: Fox Factory Holding
  ServiceCategory: Manufacturing & Components
  ProviderName: Fox Factory
  PublisherName: Fox Factory Holding Corp.
  InvoiceIssuerName: Fox Factory Holding Corp.
  BillingCurrency: USD
meters:
  - name: units_purchased
    unit: unit
    aggregation: sum
    dimensions:
      - product_line
      - sku
  - name: order_value
    unit: USD
    aggregation: sum
    dimensions:
      - product_line
principles:
  - name: Visibility
    description: Reconcile Fox Factory invoices against purchase orders; no usage telemetry API
      exists.
  - name: Allocation
    description: Allocate purchases to bills-of-materials or project codes at PO time.
  - name: Optimization
    description: Negotiate dealer-volume terms; consolidate orders to reduce shipping and
      handling.
  - name: Accountability
    description: Procurement function owns spend; review BOM cost variance against forecast.
maintainers:
